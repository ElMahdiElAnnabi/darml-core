# EXAMPLE WORKFLOW — copy this into YOUR repo, not run from here.
#
# This file lives in darml-core to document the canonical usage of the
# Darml GitHub Action. We deliberately gate it to manual `workflow_dispatch`
# only — running it on `push` to darml-core's own main would fail (the
# repo doesn't contain a model.onnx; the action expects one in your repo).
#
# To use this in your own repo:
#   1. Copy this file to .github/workflows/build.yml in YOUR repo.
#   2. Change the `on:` block to your trigger of choice — typical:
#        on:
#          push:
#            branches: [main]
#   3. Add your model file (model.onnx / .tflite / .pkl) to your repo.
#   4. Get a Darml API key at https://api.darml.dev/ and add it as a
#      repo secret named DARML_API_KEY.
#   5. Adjust the matrix `target` list to the boards you actually ship.
#
# The action itself lives at .github/actions/build/ in this repo —
# that's where the action.yml + the documentation README sit.

name: Build firmware (example — manual only)

on:
  # Manual-only in darml-core. Replace with `push:` when you copy this
  # to your own repo.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32-s3
          - stm32f4
          - rpi5
          - avr-mega328
    steps:
      - uses: actions/checkout@v4

      - name: Build for ${{ matrix.target }}
        id: darml
        uses: ElMahdiElAnnabi/darml-core/.github/actions/build@main
        with:
          model: model.onnx
          target: ${{ matrix.target }}
          api-key: ${{ secrets.DARML_API_KEY }}
          quantize: 'true'
          output-path: 'firmware-${{ matrix.target }}.zip'

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: ${{ steps.darml.outputs.artifact-path }}
          retention-days: 7
