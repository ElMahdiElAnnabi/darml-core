<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Darml — back soon</title>
<meta name="description" content="Darml is briefly offline for maintenance. We'll be back shortly." />

<!-- No-index while the site is parked so Google doesn't rewrite the
     SERP snippet to "back soon". The real landing is restored on revert. -->
<meta name="robots" content="noindex, nofollow" />

<!-- Skip the social-card overrides — same reason as robots: nothing on
     the page worth previewing right now. The OG tags from the live
     landing return automatically when this file is reverted. -->

<style>
  :root {
    --bg: #080c12;
    --panel: #10151d;
    --line: #1e2632;
    --fg: #e6ecf3;
    --muted: #8d97a7;
    --accent-2: #818cf8;
    --mono: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 520px;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 40px 32px;
    text-align: center;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent-2);
    letter-spacing: 0.5px;
    margin-bottom: 24px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  p {
    margin: 0 0 16px;
    color: var(--muted);
    font-size: 15px;
  }
  p.contact {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    font-size: 14px;
  }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .dots {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--accent-2);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50%      { opacity: 1; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="logo">DARML</div>
    <h1><span class="dots"></span>Back soon</h1>
    <p>
      We're making changes to the site. Existing API customers are
      unaffected — <code>api.darml.dev</code> keeps serving builds.
    </p>
    <p class="contact">
      Need to reach us? <a href="mailto:hello@darml.dev">hello@darml.dev</a>
    </p>
  </main>
</body>
</html>
