; Raspberry Pi RP2040 (Pico) build environment for Darml.
;
; Dual Cortex-M0+ at 133 MHz, no FPU. The arduino-pico core gives a
; familiar Arduino API on top of the official Pico SDK. tflm_cortexm
; produces M0+-compatible kernels.
;
; Inference runs on core 0 only in v1; multi-core scheduling is on
; the roadmap.

[env:rp2040]
platform     = raspberrypi
board        = pico
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git
