; STM32 build environments for Darml.
;
; EloquentTinyML works on Cortex-M targets via the Arduino framework
; on PlatformIO. STM32N6 reuses the H7 board until PlatformIO ships
; an N6 board file.

[env:stm32f4]
platform     = ststm32
board        = nucleo_f446re
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git

[env:stm32h7]
platform     = ststm32
board        = nucleo_h743zi
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git

[env:stm32n6]
platform     = ststm32
board        = nucleo_h743zi  ; TODO: swap to STM32N6 board when PlatformIO support lands
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git

[env:stm32u5]
platform     = ststm32
board        = nucleo_u575zi_q
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git
