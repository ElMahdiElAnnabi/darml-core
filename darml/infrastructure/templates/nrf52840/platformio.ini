; Nordic nRF52840 build environment for Darml.
;
; Cortex-M4F core via the Arduino framework on PlatformIO. The
; tflm_cortexm library produces the same kernels that ship for the
; STM32 envs — no Nordic-specific quant kernel is needed for v1.
;
; BLE-aware firmware (sending inferences over a GATT characteristic)
; is on the roadmap; the v1 template is Serial-only.

[env:nrf52840]
platform     = nordicnrf52
board        = nrf52840_dk
framework    = arduino
monitor_speed = 115200
build_flags  = -DTF_LITE_STATIC_MEMORY -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps     =
    eloquentarduino/tflm_cortexm@^1.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git
