; ESP32 build environments for Darml.
;
; EloquentTinyML bundles a tflite-micro distribution that links cleanly
; with the Arduino framework on PlatformIO — unlike `esp-tflite-micro`
; which needs ESP-IDF. The same library covers both LX6 (original ESP32)
; and LX7 (ESP32-S3) cores.

[env:esp32]
; Original ESP32 (Xtensa LX6). esp32dev = generic WROOM-32 / DevKit-V1.
; If you have a WROVER (PSRAM) variant, change board to e.g.
; "esp-wrover-kit" and bump tensor_arena_max_bytes in the Darml builder.
platform     = espressif32
board        = esp32dev
framework    = arduino
monitor_speed = 115200
build_flags  =
    -DCORE_DEBUG_LEVEL=0
    -DTF_LITE_STATIC_MEMORY
    -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps =
    eloquentarduino/tflm_esp32@^2.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git

[env:esp32-s3]
platform     = espressif32
board        = esp32-s3-devkitc-1
framework    = arduino
monitor_speed = 115200
build_flags  =
    -DCORE_DEBUG_LEVEL=0
    -DTF_LITE_STATIC_MEMORY
    -DTENSOR_ARENA_SIZE={{TENSOR_ARENA_SIZE}}
lib_deps =
    eloquentarduino/tflm_esp32@^2.0.0
    https://github.com/eloquentarduino/EloquentTinyML.git
